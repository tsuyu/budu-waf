# Fail2Ban action: ban/unban by editing B.U.D.U's blocklist file and asking it
# to hot-reload. budu rebuilds its blocklist (inline + this file + any remote
# feeds) on SIGHUP with zero dropped connections, and re-checks every request's
# resolved client IP against it — so the ban takes effect at the WAF layer,
# independent of network topology. See docs/FAIL2BAN.md.
#
# Each ban is written as `<ip> until=<epoch>` (now + fail2ban's bantime). budu
# auto-expires the entry at that time, so the WAF lifts the ban even if this
# action's unban is never delivered (fail2ban restart, lost signal, …). A
# permanent fail2ban ban (bantime <= 0) is written without `until=`.
#
# Requires in budu.toml:   [reputation]  blocklist_file = "/etc/budu/banned.txt"
# The file must be writable by fail2ban (root) and readable by the budu user.

[Definition]

actionstart =
actionstop =
actioncheck =

# De-dupe any existing line for this IP, then (re)write it with a fresh expiry.
actionban = bt="<bantime>"; if [ "$bt" -gt 0 ] 2>/dev/null; then exp=" until=$(( $(date +%%s) + bt ))"; else exp=""; fi;
            { [ -f "<blocklist_file>" ] && awk -v ip="<ip>" '$1 != ip' "<blocklist_file>"; printf '%%s%%s\n' "<ip>" "$exp"; } > "<blocklist_file>.tmp" && mv "<blocklist_file>.tmp" "<blocklist_file>"
            <reloadcmd>

# Remove the line for this IP (matched on the first field, ignoring any `until=`
# suffix), then reload. awk exits 0 even when the file becomes empty.
actionunban = if [ -f "<blocklist_file>" ]; then awk -v ip="<ip>" '$1 != ip' "<blocklist_file>" > "<blocklist_file>.tmp" && mv "<blocklist_file>.tmp" "<blocklist_file>"; fi
              <reloadcmd>

[Init]

# Same path as [reputation] blocklist_file in budu.toml.
blocklist_file = /etc/budu/banned.txt

# How to tell budu to reload. With the provided systemd unit (ExecReload sends
# SIGHUP) this is `systemctl reload budu`; otherwise e.g. `kill -HUP $(pgrep -x budu)`.
reloadcmd = systemctl reload budu
