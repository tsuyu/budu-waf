# Fail2Ban jail for B.U.D.U. Copy to /etc/fail2ban/jail.d/budu.conf and adjust
# `logpath` to match [log] audit_file in your budu.toml. See docs/FAIL2BAN.md.

[budu]
enabled  = true
filter   = budu
logpath  = /var/log/budu/audit.log
backend  = auto

# Ban an IP after this many audit hits within `findtime`.
maxretry = 5
findtime = 10m
bantime  = 1h
# Repeat offenders: uncomment to escalate ban time on re-offence.
# bantime.increment = true

# --- Choose ONE enforcement action ---------------------------------------
#
# (A) App-layer ban via budu's own blocklist (RECOMMENDED behind an edge proxy,
#     which is budu's standard topology). budu resolves the real client IP, so
#     banning there actually stops the attacker; a firewall ban on the budu host
#     would only block your edge proxy. Requires action.d/budu-blocklist.conf
#     and `[reputation] blocklist_file` pointing at the same file.
action = budu-blocklist[blocklist_file="/etc/budu/banned.txt", reloadcmd="systemctl reload budu"]
#
# (B) Network ban at the firewall (use when budu is DIRECTLY internet-facing).
# action = %(action_)s
