# Fail2Ban filter for the B.U.D.U WAF JSON audit log.
#
# B.U.D.U writes one JSON object per security event to its audit_file, and the
# `client_ip` field holds the *resolved* client IP (read from your edge's
# client_ip_header) — so this bans the real attacker even when budu sits behind
# a reverse proxy. See docs/FAIL2BAN.md.

[Definition]

# Ban enforced blocks and rate-limits. `<HOST>` captures the client IP.
failregex = ^.*"message":"(?:blocked|rate_limited)".*"client_ip":"<HOST>".*"enforced":true

# Never ban these (e.g. health/monitoring sources) — add IPs/CIDRs as needed.
ignoreregex =

# The audit timestamp is ISO-8601; fail2ban reads it straight out of the line.
datepattern = %%Y-%%m-%%dT%%H:%%M:%%S

# To ALSO act on detection-only mode (enforcement = "detect"), add this line to
# failregex above:
#   ^.*"message":"detected".*"client_ip":"<HOST>"
